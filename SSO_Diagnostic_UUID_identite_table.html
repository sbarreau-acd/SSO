<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>connexion SSO par UUID</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Ctext y='0.9em' font-size='90'%3E🔑%3C/text%3E
%3C/svg%3E">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="icon" href="data:,">

<style>
body { font-family: Arial; padding:40px; background:#f5f6f8; }
.box { background:#fff; padding:20px; border-radius:8px; max-width:1100px; border:1px solid #ddd; }
.row { margin-bottom:12px; }
.label { font-weight:bold; width:170px; display:inline-block; }
.value { color:#003366; word-break:break-all; }
input[type="text"] { padding:6px 8px; border:1px solid #ccc; border-radius:6px; min-width:280px; }
button { background:#003366; color:white; border:0; padding:8px 12px; border-radius:6px; cursor:pointer; }
button:disabled { opacity:0.5; cursor:not-allowed; }
.actions { margin-top:15px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
pre { background:#f4f6fa; padding:12px; border-radius:6px; font-size:12px; white-space:pre-wrap; }
.ok { color:#0b6b2e; font-weight:bold; }
.err { color:#b00020; font-weight:bold; }
.small-btn { padding:4px 8px; font-size:12px; margin-left:10px; }
.copied { color:#0b6b2e; font-weight:bold; margin-left:10px; font-size:12px; }
.hidden { display:none; }
.hint { font-size:12px; color:#666; margin-top:4px; }

/* --- Résultat formaté --- */
.result-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin:10px 0 12px; }
.card{ background:#f7f8fb; border:1px solid #e2e6ef; border-radius:8px; padding:12px; }
.card h4{ margin:0 0 10px; font-size:14px; color:#003366; }
.kv{ display:grid; grid-template-columns: 160px 1fr; gap:6px 12px; font-size:13px; }
.k{ font-weight:bold; color:#1f2a44; }
.v{ color:#003366; word-break:break-word; }
.badges{ display:flex; flex-wrap:wrap; gap:6px; }
.badge{ background:#003366; color:#fff; border-radius:999px; padding:4px 10px; font-size:12px; }
.badge.off{ background:#6b7280; }
.table{ width:100%; border-collapse:collapse; font-size:12.5px; }
.table th,.table td{ border:1px solid #e2e6ef; padding:6px 8px; text-align:left; vertical-align:top; }
.table th{ background:#eef2fa; color:#1f2a44; width:220px; }
details{ margin-top:10px; }
summary{ cursor:pointer; color:#003366; font-weight:bold; }

</style>
</head>

<body>

<h2>Connexion SSO depuis portail i-suite</h2>

<div class="box">

<div class="row">
<span class="label">Referrer :</span>
<span id="referrer" class="value"></span>
</div>

<div class="row">
<span class="label">cnx :</span>
<span id="cnx" class="value"></span>
</div>

<div class="row">
<span class="label">uuid :</span>
<span id="uuid"></span>
<button id="btnCopyUuid" class="small-btn">Copier UUID</button>
<span id="uuidCopied" class="copied hidden">Copié</span>
</div>
<hr>

<div class="row">
<span class="label">IP Navigateur :</span>
<span id="browserIp" class="value"></span>
</div>

<div class="row">
<span class="label">X-CLIENT-IP :</span>
<input type="text" id="xClientIp">
</div>

<div class="row">
<label>
<input type="checkbox" id="useXClientIp">
 Envoyer le header X-CLIENT-IP
</label>
</div>
<hr>






<div class="row">
<span class="label">URL API :</span>
<span id="apiUrl" class="value"></span>
</div>

<div class="row">
<span class="label">URL Portail :</span>
<span id="portalUrl" class="value"></span>
<button id="btnPortal" class="small-btn">Ouvrir</button>
</div>


<div class="actions">
<button id="btnTest">Tester SSO (UUID)</button>
<button id="btnSwagger">Ouvrir Swagger</button>
<button id="btnCurl">Copier CURL</button>
<span id="curlCopied" class="copied hidden">Copié</span>
</div>


<h3>Résultat</h3>
<div id="resultTitle"></div>

<div id="resultFormatted" class="hidden">
  <div class="result-grid">
    <div class="card">
      <h4>Identité</h4>
      <table class="table" id="tblIdentite"></table>
    </div>
    <div class="card">
      <h4>Variables de session</h4>
      <table class="table" id="tblVariables"></table>
    </div>
  </div>

  <div class="card">
    <h4>Options Web</h4>
    <div class="badges" id="badgesOptions"></div>
  </div>
</div>

<details>
  <summary>Réponse brute</summary>
  <pre id="result"></pre>
</details>


</div>

<script>
(function(){

function showCopied(id){
 var el = document.getElementById(id);
 el.classList.remove("hidden");
 setTimeout(function(){ el.classList.add("hidden"); }, 2000);
}

function copyText(text, id){
 if(!text) return;
 var ta = document.createElement("textarea");
 ta.value = text;
 document.body.appendChild(ta);
 ta.select();
 document.execCommand("copy");
 document.body.removeChild(ta);
 showCopied(id);
}

function safeOpen(url){
 var w = window.open(url, "_blank");
 if(!w) window.location.href = url;
}

function normalize(u){
 return (u || "").replace(/\/+$/, "");
}

var referrer = document.referrer || "";
var params = new URLSearchParams(window.location.search);

var cnx = "";
var uuidRaw = "";

params.forEach(function(value, key){
 var k = key.toLowerCase();
 if(k === "cnx") cnx = value;
 if(k === "uuid") uuidRaw = value;
});

var uuid = uuidRaw || "";
if(uuid.endsWith("/")) uuid = uuid.slice(0,-1);

var uuidValid = /^[a-z0-9]+$/i.test(uuid);

document.getElementById("referrer").textContent = referrer || "Aucun";
document.getElementById("cnx").textContent = cnx || "Non présent";
document.getElementById("uuid").textContent = uuid || "Non présent";

var apiOverride = params.get("api");
var apiUrl = null;

if(apiOverride){
 apiUrl = normalize(apiOverride);
} else if(referrer && cnx){
 try{
   var r = new URL(referrer);
   apiUrl = normalize(r.origin + "/" + cnx + "/api");
 }catch(e){}
}

document.getElementById("apiUrl").textContent = apiUrl || "Non disponible";

var portalUrl = null;
if(apiUrl && uuidValid){
 var origin = new URL(apiUrl).origin;
 portalUrl = origin + "/" + cnx + "/isuiteexpert/?UUID=" + encodeURIComponent(uuid);
}
document.getElementById("portalUrl").textContent = portalUrl || "Non disponible";
document.getElementById("btnPortal").disabled = !portalUrl;

function getContext(){
 return {
   apiUrl: apiUrl,
   uuid: uuidValid ? uuid : null,
   xClientIp: document.getElementById("xClientIp").value.trim(),
   sendXClientIp: document.getElementById("useXClientIp").checked
 };
}


function escapeHtml(s){
  return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

function renderSsoResult(data){
  var formatted = document.getElementById("resultFormatted");
  var tblId = document.getElementById("tblIdentite");
  var badges = document.getElementById("badgesOptions");
  var tbl = document.getElementById("tblVariables");

  // reset
  tblId.innerHTML = "";
  badges.innerHTML = "";
  tbl.innerHTML = "";
  formatted.classList.add("hidden");

  if(!data || typeof data !== "object") return;
  // Identité (table depuis data.Identite)
  var identObj = (data.Identite && typeof data.Identite === "object") ? data.Identite : null;

  // Fallback si l'API renvoie encore les champs à plat
  var typeVal   = identObj ? identObj.Type   : data.Type;
  var codeVal   = identObj ? identObj.Code   : data.Code;
  var emailVal  = identObj ? identObj.Email  : data.Email;
  var prenomVal = identObj ? identObj.Prenom : data.Prenom;
  var nomVal    = identObj ? identObj.Nom    : data.Nom;

  var rowsId = "";
  [
    ["Type", typeVal],
    ["Code", codeVal],
    ["Email", emailVal],
    ["Prenom", prenomVal],
    ["Nom", nomVal]
  ].forEach(function(pair){
    if(pair[1] === undefined || pair[1] === null || pair[1] === "") return;
    var key = pair[0];
    var val = pair[1];

    // Mise en gras Type / Code (dans la cellule valeur)
    var valHtml = escapeHtml(val);
    if(key === "Type" || key === "Code"){
      valHtml = "<strong>" + valHtml + "</strong>";
    }
    rowsId += "<tr><th>"+escapeHtml(key)+"</th><td>"+valHtml+"</td></tr>";
  });

  // Si aucun champ, afficher un placeholder
  tblId.innerHTML = rowsId || "<tr><td>Aucune donnée</td></tr>";


  // OptionsWeb
  if(Array.isArray(data.OptionsWeb) && data.OptionsWeb.length){
    data.OptionsWeb.forEach(function(o){
      var lib = (o && (o.Libelle ?? o.libelle)) ?? "";
      var val = (o && (o.Valeur ?? o.valeur)) ?? "";
      var off = (val === false || val === "false" || val === 0 || val === "0");
      var cls = off ? "badge off" : "badge";
      var label = String(lib || "Option").trim();
      badges.insertAdjacentHTML("beforeend",
        "<span class='"+cls+"' title='Valeur: "+escapeHtml(val)+"'>"+escapeHtml(label)+"</span>"
      );
    });
  } else {
    badges.insertAdjacentHTML("beforeend","<span class='hint'>Aucune option</span>");
  }

  // VariablesSession
  var vars = data.VariablesSession;
  if(vars && typeof vars === "object"){
    var rows = "";
    Object.keys(vars).forEach(function(k){
      rows += "<tr><th>"+escapeHtml(k)+"</th><td>"+escapeHtml(vars[k])+"</td></tr>";
    });
    tbl.innerHTML = rows || "<tr><td>Aucune variable</td></tr>";
  } else {
    tbl.innerHTML = "<tr><td>Aucune variable</td></tr>";
  }

  formatted.classList.remove("hidden");
}


function testSSO(){
 var ctx = getContext();
 var title = document.getElementById("resultTitle");
 var result = document.getElementById("result");

 result.textContent = "";
 title.innerHTML = "";

 if(!ctx.apiUrl){
   title.innerHTML = "<span class='err'>URL API non disponible</span>";
   return;
 }

 if(!ctx.uuid){
   title.innerHTML = "<span class='err'>UUID invalide</span>";
   return;
 }

 var endpoint = normalize(ctx.apiUrl) + "/v1/authentification/uuid";

 var headers = {
   "accept": "text/plain",
   "Content-Type": "application/json-patch+json"
 };

 if(ctx.sendXClientIp && ctx.xClientIp){
   headers["X-CLIENT-IP"] = ctx.xClientIp;
 }

 fetch(endpoint,{
   method:"POST",
   headers:headers,
   body:JSON.stringify({UUID:ctx.uuid})
 }).then(function(r){
   return r.text().then(function(t){
     return {ok:r.ok,status:r.status,text:t};
   });
 }).then(function(res){
   if(!res.ok){
     title.innerHTML = "<span class='err'>Erreur HTTP "+res.status+"</span>";
     result.textContent = res.text;
     document.getElementById('resultFormatted').classList.add('hidden');
     return;
   }
   title.innerHTML = "<span class='ok'>Connexion SSO valide</span>";
   result.textContent = res.text;

   // Tentative de mise en forme
   try{
     var parsed = JSON.parse(res.text);
     renderSsoResult(parsed);
   }catch(e){
     // Certaines instances renvoient du texte non-JSON : on laisse la réponse brute uniquement.
     document.getElementById('resultFormatted').classList.add('hidden');
   }
 }).catch(function(e){
   title.innerHTML = "<span class='err'>Erreur réseau / CORS</span>";
   result.textContent = e.message;
   document.getElementById('resultFormatted').classList.add('hidden');
 });
}

function openSwagger(){
 if(!apiUrl) return;
 safeOpen(normalize(apiUrl)+"/swagger/index.html");
}

function copyCurl(){
 var ctx = getContext();
 if(!ctx.apiUrl || !ctx.uuid) return;

 var curl = "curl -X 'POST' \\\n" +
 "  '"+normalize(ctx.apiUrl)+"/v1/authentification/uuid' \\\n" +
 "  -H 'accept: text/plain' \\\n";

 if(ctx.sendXClientIp && ctx.xClientIp){
   curl += "  -H 'X-CLIENT-IP: "+ctx.xClientIp+"' \\\n";
 }

 curl += "  -H 'Content-Type: application/json-patch+json' \\\n" +
 "  -d '{\n  \"UUID\": \""+ctx.uuid+"\"\n}'";

 copyText(curl,"curlCopied");
}

document.getElementById("btnTest").addEventListener("click",testSSO);
document.getElementById("btnSwagger").addEventListener("click",openSwagger);
document.getElementById("btnCurl").addEventListener("click",copyCurl);
document.getElementById("btnCopyUuid").addEventListener("click",function(){
 if(uuidValid) copyText(uuid,"uuidCopied");
});
document.getElementById("btnPortal").addEventListener("click",function(){
 if(portalUrl) safeOpen(portalUrl);
});

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>{
 document.getElementById("browserIp").textContent=d.ip+" (ipify)";
 document.getElementById("xClientIp").value=d.ip;
})
.catch(()=>document.getElementById("browserIp").textContent="Non disponible");

})();
</script>

</body>
</html>
