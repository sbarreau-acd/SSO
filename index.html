<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SSO - Test UUID</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Ctext y='0.9em' font-size='90'%3E🔑%3C/text%3E
%3C/svg%3E">
<meta name="referrer" content="strict-origin-when-cross-origin">

<style>
body { font-family: Arial; padding:40px; background:#f5f6f8; }
.box { background:#fff; padding:20px; border-radius:8px; max-width:1000px; border:1px solid #ddd; }
.row { margin-bottom:12px; }
.label { font-weight:bold; width:150px; display:inline-block; }
.value { color:#003366; word-break:break-all; }
button { background:#003366; color:white; border:0; padding:8px 12px; border-radius:6px; cursor:pointer; }
.small-btn { padding:4px 8px; font-size:12px; margin-left:10px; }
.actions { margin-top:15px; display:flex; gap:10px; flex-wrap:wrap; }
pre { background:#f4f6fa; padding:12px; border-radius:6px; font-size:12px; white-space:pre-wrap; }
.ok { color:#0b6b2e; font-weight:bold; }
.err { color:#b00020; font-weight:bold; }
.copied { color:#0b6b2e; font-weight:bold; margin-left:10px; font-size:12px; }
.hidden { display:none; }
</style>
</head>

<body>

<h2>Diagnostic SSO UUID</h2>

<div class="box">

<div class="row">
<span class="label">URL (Referrer) :</span>
<span id="referrer" class="value"></span>
</div>

<div class="row">
<span class="label">cnx :</span>
<span id="cnx" class="value"></span>
</div>

<div class="row">
<span class="label">uuid :</span>
<span id="uuid" class="value"></span>
<button id="btnCopyUuid" class="small-btn">Copier UUID</button>
<span id="uuidCopied" class="copied hidden">Copié</span>
</div>

<div class="row">
<span class="label">URL API :</span>
<span id="apiUrl" class="value"></span>
</div>

<div class="row">
<span class="label">IP Navigateur :</span>
<span id="browserIp" class="value"></span>
</div>

<div class="row">
<span class="label">X-CLIENT-IP :</span>
<input type="text" id="xClientIp" placeholder="Ex : 192.168.1.1">
</div>

<div class="row">
<label>
<input type="checkbox" id="useXClientIp">
 Envoyer le header X-CLIENT-IP
</label>
</div>

<div class="actions">
<button id="btnTest">Tester SSO (UUID)</button>
<button id="btnSwagger">Ouvrir Swagger</button>
<button id="btnCurl">Copier CURL</button>
</div>

<h3>Résultat</h3>
<div id="resultTitle"></div>
<pre id="result"></pre>

</div>

<script>
(function(){

const referrer = document.referrer || "";
const params = new URLSearchParams(window.location.search);

let cnx = "";
let uuid = "";

for (const [key, value] of params.entries()) {
 if (key.toLowerCase() === "cnx") cnx = value;
 if (key.toLowerCase() === "uuid") uuid = value;
}

if (uuid.endsWith("/")) uuid = uuid.slice(0,-1);

const uuidValid = /^[a-z0-9]+$/i.test(uuid);

if (!cnx) cnx = "Non présent";
if (!uuidValid) uuid = uuid ? "UUID invalide" : "Non présent";

let apiUrl = null;
if (referrer && cnx !== "Non présent") {
 try {
   const urlObj = new URL(referrer);
   apiUrl = urlObj.origin + "/" + cnx + "/api";
 } catch {}
}

document.getElementById("referrer").textContent = referrer || "Aucun referrer";
document.getElementById("cnx").textContent = cnx;
document.getElementById("uuid").textContent = uuid;
document.getElementById("apiUrl").textContent = apiUrl || "Non disponible";

async function detectBrowserIP() {
 try {
   const r = await fetch("https://api.ipify.org?format=json");
   if (!r.ok) throw new Error();
   const data = await r.json();
   document.getElementById("browserIp").textContent = data.ip + " (ipify)";
   document.getElementById("xClientIp").value = data.ip;
 } catch {
   document.getElementById("browserIp").textContent = "Impossible de récupérer l’IP";
 }
}

async function copyUUID() {
 if (!uuidValid) return;

 const copiedLabel = document.getElementById("uuidCopied");

 try {
   await navigator.clipboard.writeText(uuid);
 } catch {
   const textarea = document.createElement("textarea");
   textarea.value = uuid;
   document.body.appendChild(textarea);
   textarea.select();
   document.execCommand("copy");
   document.body.removeChild(textarea);
 }

 copiedLabel.classList.remove("hidden");

 setTimeout(() => {
   copiedLabel.classList.add("hidden");
 }, 2000);
}

function getContext() {
 return {
   apiUrl: apiUrl,
   uuid: uuidValid ? uuid : null,
   xClientIp: document.getElementById("xClientIp").value.trim(),
   sendXClientIp: document.getElementById("useXClientIp").checked
 };
}

async function testSSO() {

const ctx = getContext();
const result = document.getElementById("result");
const title = document.getElementById("resultTitle");

result.textContent = "";
title.innerHTML = "";

if (!ctx.apiUrl) {
 title.innerHTML = "<span class='err'>URL API non disponible</span>";
 return;
}

if (!ctx.uuid) {
 title.innerHTML = "<span class='err'>UUID invalide</span>";
 return;
}

const endpoint = ctx.apiUrl + "/v1/authentification/uuid";

const headers = {
 "accept": "text/plain",
 "Content-Type": "application/json-patch+json"
};

if (ctx.sendXClientIp && ctx.xClientIp) {
 headers["X-CLIENT-IP"] = ctx.xClientIp;
}

try {
 const response = await fetch(endpoint, {
   method: "POST",
   headers: headers,
   body: JSON.stringify({ UUID: ctx.uuid })
 });

 const text = await response.text();

 if (!response.ok) {
   title.innerHTML = "<span class='err'>Erreur HTTP " + response.status + "</span>";
   result.textContent = text;
   return;
 }

 title.innerHTML = "<span class='ok'>Connexion SSO valide</span>";
 try {
   result.textContent = JSON.stringify(JSON.parse(text), null, 2);
 } catch {
   result.textContent = text;
 }

} catch (e) {
 title.innerHTML = "<span class='err'>Erreur réseau / CORS</span>";
 result.textContent = e.message;
}

}

document.getElementById("btnTest").addEventListener("click", testSSO);
document.getElementById("btnCopyUuid").addEventListener("click", copyUUID);

detectBrowserIP();

})();
</script>

</body>
</html>
