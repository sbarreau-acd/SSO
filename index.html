<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion SSO par UUID – V26.03</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E
%3Ctext y='0.9em' font-size='90'%3E🔑%3C/text%3E
%3C/svg%3E">
<link rel="icon" href="data:,">

<meta name="referrer" content="strict-origin-when-cross-origin">

<style>
body { font-family: Arial; padding:40px; background:#f5f6f8; }
.box { background:#fff; padding:20px; border-radius:8px; max-width:1100px; border:1px solid #ddd; }
.row { margin-bottom:12px; }
.label { font-weight:bold; width:170px; display:inline-block; }
.value { color:#003366; word-break:break-all; }
button { background:#003366; color:white; border:0; padding:8px 12px; border-radius:6px; cursor:pointer; }
button:disabled { opacity:0.5; cursor:not-allowed; }
.small-btn { padding:4px 8px; font-size:12px; margin-left:10px; }
.copied { color:#0b6b2e; font-weight:bold; margin-left:10px; font-size:12px; }
.hidden { display:none; }
.ok { color:#0b6b2e; font-weight:bold; }
.err { color:#b00020; font-weight:bold; }

.row-portal{ display:flex; align-items:center; gap:10px; }
.row-portal .value{ flex:1; }
.portal-actions{ display:flex; gap:8px; }

.auto-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#e6f4ea;
  color:#0b6b2e;
  border:1px solid #0b6b2e;
  padding:4px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  margin-top:10px;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity .25s ease, transform .25s ease;
}
.auto-badge.show{ opacity:1; transform:translateY(0); }

.result-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin:10px 0 12px; }
.card{ background:#f7f8fb; border:1px solid #e2e6ef; border-radius:8px; padding:12px; }
.card h4{ margin:0 0 10px; font-size:14px; color:#003366; }
.table{ width:100%; border-collapse:collapse; font-size:12.5px; }
.table th,.table td{ border:1px solid #e2e6ef; padding:6px 8px; text-align:left; }
.table th{ background:#eef2fa; width:200px; }

.badges{ display:flex; flex-wrap:wrap; gap:6px; }
.badge-btn{
  border:0;
  cursor:pointer;
  border-radius:999px;
  padding:4px 10px;
  font-size:12px;
  color:#fff;
}
.badge-btn.on{ background:#0b6b2e; }
.badge-btn.off{ background:#6b7280; cursor:default; opacity:.85; }
</style>
</head>

<body>
<h2>Connexion SSO depuis portail i-suite – V26.03</h2>
<div class="box">

<div class="row">
<span class="label">Referrer :</span>
<span id="referrer" class="value"></span>
</div>

<div class="row">
<span class="label">cnx :</span>
<span id="cnx" class="value"></span>
</div>

<div class="row">
<span class="label">uuid :</span>
<span id="uuid"></span>
<button id="btnCopyUuid" class="small-btn">Copier UUID</button>
<span id="uuidCopied" class="copied hidden">Copié</span>
</div>

<hr>

<div class="row">
<span class="label">IP Navigateur :</span>
<span id="browserIp" class="value"></span>
</div>

<div class="row">
<span class="label">X-CLIENT-IP :</span>
<input type="text" id="xClientIp">
</div>

<div class="row">
<label>
<input type="checkbox" id="useXClientIp">
 Envoyer le header X-CLIENT-IP
</label>
</div>

<hr>

<div class="row">
<span class="label">URL API :</span>
<span id="apiUrl" class="value"></span>
</div>

<div class="row row-portal">
<span class="label">URL Portail :</span>
<span id="portalUrl" class="value"></span>
<div class="portal-actions">
<button id="btnCopyPortal" class="small-btn">Copier</button>
<button id="btnPortal" class="small-btn">Ouvrir</button>
<span id="portalCopied" class="copied hidden">Copié</span>
</div>
</div>

<button id="btnTest">Tester SSO (UUID)</button>

<h3>Résultat</h3>
<div id="resultTitle"></div>
<div id="autoIndicator" class="auto-badge hidden">⚡ Auto test déclenché</div>

<div id="resultFormatted" class="hidden">
<div class="result-grid">
<div class="card">
<h4>Identité</h4>
<table class="table" id="tblIdentite"></table>
</div>
<div class="card">
<h4>Variables de session</h4>
<table class="table" id="tblVariables"></table>
</div>
</div>

<div class="card">
<h4>Options Web</h4>
<div class="badges" id="badgesOptions"></div>
</div>
</div>

<details>
<summary>Réponse brute</summary>
<pre id="result"></pre>
</details>

</div>

<script>
(function(){

function normalize(u){ return (u||"").replace(/\/+$/,""); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function copyText(text,id){
if(!text) return;
var ta=document.createElement("textarea");
ta.value=text;
document.body.appendChild(ta);
ta.select();
document.execCommand("copy");
document.body.removeChild(ta);
document.getElementById(id).classList.remove("hidden");
setTimeout(()=>document.getElementById(id).classList.add("hidden"),2000);
}

var referrer=document.referrer||"";
var params=new URLSearchParams(window.location.search);

var cnx="", uuid="";
params.forEach((v,k)=>{
k=k.toLowerCase();
if(k==="cnx") cnx=v;
if(k==="uuid") uuid=v;
});
uuid=(uuid||"").replace(/\/$/,"");
var uuidValid=/^[a-z0-9]+$/i.test(uuid);

document.getElementById("referrer").textContent=referrer||"Aucun";
document.getElementById("cnx").textContent=cnx||"Non présent";
document.getElementById("uuid").textContent=uuid||"Non présent";
document.getElementById("btnCopyUuid").disabled=!uuidValid;

var apiUrl=null;
if(referrer && cnx){
try{
var r=new URL(referrer);
apiUrl=normalize(r.origin+"/"+cnx+"/api");
}catch(e){}
}
document.getElementById("apiUrl").textContent=apiUrl||"Non disponible";

var portalUrl=null;
if(apiUrl && uuidValid){
portalUrl=new URL(apiUrl).origin+"/"+cnx+"/isuiteexpert/?UUID="+encodeURIComponent(uuid);
}
document.getElementById("portalUrl").textContent=portalUrl||"Non disponible";
document.getElementById("btnPortal").disabled=!portalUrl;
document.getElementById("btnCopyPortal").disabled=!portalUrl;

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>{
document.getElementById("browserIp").textContent=d.ip+" (ipify)";
document.getElementById("xClientIp").value=d.ip;
});

function renderSsoResult(data){
var tblId=document.getElementById("tblIdentite");
var tblVars=document.getElementById("tblVariables");
var badges=document.getElementById("badgesOptions");
tblId.innerHTML=""; tblVars.innerHTML=""; badges.innerHTML="";
document.getElementById("resultFormatted").classList.remove("hidden");

if(data.Identite){
["Type","Code","Email","Prenom","Nom"].forEach(k=>{
if(data.Identite[k])
tblId.innerHTML+=`<tr><th>${k}</th><td>${escapeHtml(data.Identite[k])}</td></tr>`;
});
}

if(data.VariablesSession){
Object.keys(data.VariablesSession).forEach(k=>{
tblVars.innerHTML+=`<tr><th>${k}</th><td>${escapeHtml(data.VariablesSession[k])}</td></tr>`;
});
}

const CMD_MAP={
"i-Admin":"IADMIN",
"i-Ged":"IGED",
"i-Dépôt":"IDEPOT",
"i-Comptes":"ICOMPTES",
"i-Banque":"IBANQUE",
"i-Comptabilité":"comptaentreprise",
"i-Facture":"IFACTURE",
"i-Dossier":"IDOSSIER",
"i-Stats":"ISTATS"
};

if(Array.isArray(data.OptionsWeb)){
data.OptionsWeb.forEach(o=>{
let lib=o.Libelle||"";
let cmd=null;
Object.keys(CMD_MAP).forEach(k=>{
if(lib.toLowerCase().startsWith(k.toLowerCase())) cmd=CMD_MAP[k];
});
if(cmd && portalUrl){
badges.innerHTML+=`<button class="badge-btn on" onclick="window.open('${portalUrl}&CMD=${cmd}','_blank')">${escapeHtml(lib)}</button>`;
}else{
badges.innerHTML+=`<button class="badge-btn off" disabled>${escapeHtml(lib)}</button>`;
}
});
}
}

function testSSO(){
if(!apiUrl||!uuidValid) return;
fetch(apiUrl+"/v1/authentification/uuid",{
method:"POST",
headers:{"Content-Type":"application/json-patch+json"},
body:JSON.stringify({UUID:uuid})
})
.then(r=>r.text().then(t=>({ok:r.ok,text:t})))
.then(res=>{
document.getElementById("result").textContent=res.text;
if(res.ok){
document.getElementById("resultTitle").innerHTML="<span class='ok'>Connexion SSO valide</span>";
renderSsoResult(JSON.parse(res.text));
}else{
document.getElementById("resultTitle").innerHTML="<span class='err'>Erreur</span>";
}
});
}

document.getElementById("btnTest").addEventListener("click",testSSO);
document.getElementById("btnCopyUuid").addEventListener("click",()=>copyText(uuid,"uuidCopied"));
document.getElementById("btnCopyPortal").addEventListener("click",()=>copyText(portalUrl,"portalCopied"));
document.getElementById("btnPortal").addEventListener("click",()=>window.open(portalUrl,"_blank"));

})();
</script>

</body>
</html>
